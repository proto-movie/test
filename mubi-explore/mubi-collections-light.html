<style>
@font-face {
  font-family: 'Riforma';
  font-display: swap;
  src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Regular.woff2) format('woff2');
}
@font-face {
  font-family: 'Riforma';
  font-display: swap;
  src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Medium.woff2) format('woff2');
  font-weight: 500;
}
@font-face {
  font-family: 'Riforma';
  font-display: swap;
  src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Bold.woff2) format('woff2');
  font-weight: bold;
}

:root {
  --bg:       #f0f2f6;
  --bg-2:     #e4e8f0;
  --bg-3:     #d6dbe6;
  --bg-4:     #c8cedb;
  --text:     #111111;
  --text-2:   #484848;
  --text-3:   #959595;
  --red:      #001489;
  --border:   rgba(0,0,0,0.09);
  --border-2: rgba(0,0,0,0.17);
}
.dark {
  --bg:       #0d1117;
  --bg-2:     #161c26;
  --bg-3:     #1e2533;
  --bg-4:     #262e3f;
  --text:     #e8edf5;
  --text-2:   #a8b4c8;
  --text-3:   #6b7a94;
  --border:   rgba(168,180,200,0.08);
  --border-2: rgba(168,180,200,0.15);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 390px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Riforma', sans-serif;
  line-height: 1;
  -webkit-font-smoothing: antialiased;
}
.screen {
  width: 390px;
  height: 844px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Status Bar */
.status-bar {
  height: 44px;
  padding: 14px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
.status-icons { display: flex; align-items: center; gap: 7px; }

/* Page Header */
.page-header {
  padding: 10px 16px 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title {
  font-family: 'Riforma', sans-serif;
  font-size: 28px;
  font-weight: bold;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: -0.5px;
}

/* Filter Tabs */
.filter-tabs {
  display: flex;
  gap: 0;
  padding: 10px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 7px 14px;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-3);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  flex-shrink: 0;
}
.filter-tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.content::-webkit-scrollbar { display: none; }

/* Featured Hero Card */
.featured-hero {
  margin: 12px 16px;
  overflow: hidden;
  height: 168px;
  position: relative;
  cursor: pointer;
}
.fh-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}
.fh-scrim {
  position: absolute;
  inset: 0;
}
.fh-treatment {
  display: block;
  max-height: 80px;
  max-width: 80%;
  object-fit: contain;
  object-position: left center;
  margin-bottom: 6px;
}
.fh-content {
  position: absolute;
  inset: 0;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.fh-title {
  font-family: 'Riforma', sans-serif;
  font-size: 19px;
  font-weight: bold;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: -0.4px;
  line-height: 1.05;
  margin-bottom: 5px;
}
.fh-subtitle {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.72);
  text-transform: uppercase;
  letter-spacing: 0.1px;
  margin-bottom: 5px;
}
.fh-count {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: -0.1px;
}
.fh-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(0,0,0,0.35);
  color: rgba(255,255,255,0.85);
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 1.5px;
  padding: 4px 8px;
  border-radius: 3px;
  text-transform: uppercase;
}

/* Collections Grid */
.coll-grid {
  padding: 0 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 160px;
  gap: 10px;
}

.coll-card {
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--bg-3);
  height: 100%;
}

.coll-card-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.coll-card-bg-scrim {
  position: absolute;
  inset: 0;
}

.coll-treatment-img {
  display: block;
  max-height: 50px;
  max-width: 100%;
  object-fit: contain;
  object-position: left bottom;
  margin-bottom: 4px;
}

.coll-card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 10px 8px;
  min-height: 68px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
}
.coll-card-title {
  font-family: 'Riforma', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: -0.2px;
  line-height: 1.2;
  margin-bottom: 3px;
  color: #ffffff;
}
.coll-card-subtitle {
  font-size: 16px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: -0.1px;
  line-height: 1.2;
  margin-bottom: 3px;
  color: #ffffff;
}
.coll-card-meta {
  font-size: 14px;
  opacity: 0.5;
}

/* Bottom Nav */
.bottom-nav {
  height: 83px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 2px 0;
}
.nav-icon { color: var(--text-3); }
.nav-icon.active { color: var(--text); }
.nav-label { font-size: 9.5px; font-weight: 500; color: var(--text-3); letter-spacing: 0.2px; }
.nav-label.active { color: var(--text); }
.nav-tab.active-tab .nav-dot {
  width: 4px; height: 4px; border-radius: 50%; background: var(--text); margin-top: 2px;
}
</style>

// Blend hex colour with white at given ratio (0=hex, 1=white)
function tintColor(hex, ratio) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const tr = Math.round(r + (255-r)*ratio), tg = Math.round(g + (255-g)*ratio), tb = Math.round(b + (255-b)*ratio);
  return `rgb(${tr},${tg},${tb})`;
}
// Pick black or white text based on luminance of tinted bg
function textColor(hex, ratio) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const tr = r + (255-r)*ratio, tg = g + (255-g)*ratio, tb = b + (255-b)*ratio;
  const lum = (0.299*tr + 0.587*tg + 0.114*tb) / 255;
  return lum > 0.55 ? '#111111' : '#ffffff';
}

// Render featured hero (first collection)
const DEFAULT_HERO = COLLECTIONS[0];
const DIRECTOR_HERO = COLLECTIONS.find(c => c.slug === 'david-lynch-fr') || DEFAULT_HERO;

const HERO_BG_POSITION = {
  'david-lynch-fr': 'center 20%'
};
const HERO_TREATMENT_HEIGHT = {
  'david-lynch-fr': '36px'
};

function renderHero(col) {
  const fColor = col.override || col.color;
  const bgPos = HERO_BG_POSITION[col.slug] || 'center';
  const treatH = HERO_TREATMENT_HEIGHT[col.slug] || '80px';
  document.getElementById('featured-hero').innerHTML = `
    <div class="fh-bg" style="background-image:url('${col.img}'); background-color:${fColor}; background-position:${bgPos}"></div>
    <div class="fh-scrim" style="background:linear-gradient(to top, ${fColor} 0%, transparent 60%)"></div>
    <div class="fh-content">
      ${col.treatment
        ? `<img class="fh-treatment" src="${col.treatment}" alt="${col.title}" style="max-height:${treatH}">`
        : `<div class="fh-title">${col.title}</div>`}
      ${col.subtitle ? `<div class="fh-subtitle">${col.subtitle}</div>` : ''}
    </div>
  `;
}

renderHero(DEFAULT_HERO);

const DIRECTOR_SLUGS = new Set([
  'buster-keaton-uk','jafar-panahi-collection','2025-debuts','rejtman-martin',
  'david-lynch-fr','christian-petzold','women-directors','the-new-auteurs',
  'lavdiaz','reichardt'
]);

function getCategory(c) {
  if (DIRECTOR_SLUGS.has(c.slug)) return 'director';
  return 'all';
}

// Render grid (all collections except featured)
const grid = document.getElementById('coll-grid');
function renderCard(c) {
  const card = document.createElement('div');
  card.className = 'coll-card';
  card.dataset.category = getCategory(c);
  const col = c.override || c.color;
  card.style.backgroundColor = col;
  card.innerHTML = `
    <div class="coll-card-bg" style="background-image:url('${c.img}'); background-color:${col}">
      <div class="coll-card-bg-scrim" style="background:linear-gradient(to top, ${col} 0%, transparent 90%)"></div>
    </div>
    <div class="coll-card-info" style="background:linear-gradient(to bottom, transparent, ${col} 20px); color:#ffffff">
      ${c.treatment
        ? `<img class="coll-treatment-img" src="${c.treatment}" alt="${c.title}">`
        : c.subtitle
          ? `<div class="coll-card-title">${c.title}</div>
             <div class="coll-card-subtitle">${c.subtitle}</div>`
          : `<div class="coll-card-subtitle">${c.title}</div>`
      }
    </div>
  `;
  card.addEventListener('click', () => location.href = 'mubi-film-detail-light.html');
  return card;
}

COLLECTIONS.slice(1).forEach(c => grid.appendChild(renderCard(c)));

// Tab filtering
let activeFilter = 'all';
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const label = tab.textContent.trim().toLowerCase();
    activeFilter = label === 'director focus' ? 'director' : 'all';
    renderHero(activeFilter === 'director' ? DIRECTOR_HERO : DEFAULT_HERO);
    document.getElementById('featured-hero').addEventListener('click', () => location.href = 'mubi-film-detail-light.html');
    document.querySelectorAll('.coll-card').forEach(card => {
      const show = activeFilter === 'all' || card.dataset.category === activeFilter;
      card.style.display = show ? '' : 'none';
    });
  });
});

// Featured hero click
document.getElementById('featured-hero').addEventListener('click', () => location.href = 'mubi-film-detail-light.html');

// Theme toggle
document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.querySelector('.screen').classList.toggle('dark');
  document.querySelector('html').classList.toggle('dark', isDark);
  document.getElementById('icon-moon').style.display = isDark ? 'none' : '';
  document.getElementById('icon-sun').style.display = isDark ? '' : 'none';
});

// Bottom nav
document.querySelectorAll('.nav-tab').forEach(tab => {
  const label = tab.querySelector('.nav-label');
  if (!label) return;
  const map = {Home:'mubi-home-light.html',Collections:'mubi-collections-light.html',Search:'mubi-search-mobile-light.html',Watchlist:'mubi-watchlist-light.html',Account:'mubi-account-light.html'};
  const dest = map[label.textContent.trim()];
  if (dest) tab.addEventListener('click', () => location.href = dest);
});
</script>
