<head>

  <style>
    @font-face { font-family: 'Riforma'; font-display: swap;
      src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Regular.woff2) format('woff2'); }
    @font-face { font-family: 'Riforma'; font-weight: 500; font-display: swap;
      src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Medium.woff2) format('woff2'); }
    @font-face { font-family: 'Riforma'; font-weight: bold; font-display: swap;
      src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Bold.woff2) format('woff2'); }
    @font-face { font-family: 'Riforma'; font-style: italic; font-display: swap;
      src: url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Italic.woff2) format('woff2'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Riforma, Helvetica, Arial, sans-serif;
      background: #fff;
      color: #323232;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }

    /* ─── CONTAINER ─── */
    .wrap { width: 100%; padding: 0 20px; margin: 0 auto; }
    @media (min-width: 810px)  { .wrap { padding: 0 22px; max-width: 836px; } }
    @media (min-width: 1186px) { .wrap { max-width: 1124px; } }
    @media (min-width: 1562px) { .wrap { max-width: 1500px; } }

    /* ─── HEADER / NAV ─── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #EAEAEA;
      height: 60px;
    }
    @media (min-width: 1186px) { .site-header { height: 50px; } }

    .nav-desktop {
      display: none;
    }
    @media (min-width: 1186px) {
      .nav-desktop {
        display: flex;
        align-items: center;
        height: 100%;
        padding: 0 22px;
        max-width: 1124px;
        margin: 0 auto;
      }
    }
    @media (min-width: 1562px) { .nav-desktop { max-width: 1500px; } }

    .nav-logo { flex-shrink: 0; padding-right: 21px; display: flex; align-items: center; }

    .nav-links {
      display: flex;
      align-items: center;
      align-self: flex-end;
      margin-bottom: 7px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .nav-link {
      display: block;
      padding: 0 15px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      line-height: 24px;
      color: rgba(0,0,0,0.45);
      transition: color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: #323232; }
    .nav-link.is-active { color: #323232; }
    .nav-avatar {
      display: flex; align-items: center;
      padding: 0 8px 0 15px;
    }
    .nav-avatar img {
      width: 22px; height: 22px;
      border-radius: 4px;
      object-fit: cover;
    }

    .nav-hamburger {
      display: flex; align-items: center;
      padding: 0 8px 0 8px;
      color: rgba(0,0,0,0.45);
    }
    .nav-hamburger:hover { color: #323232; }
    .nav-hamburger-wrap { position: relative; }

    .nav-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: #fff;
      border: 1px solid #E0E0E0;
      min-width: 200px;
      z-index: 200;
    }
    .nav-dropdown.open { display: block; }
    .nav-dropdown a {
      display: block;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 400;
      color: #666;
      white-space: nowrap;
    }
    .nav-dropdown a:hover { color: #323232; background: #F8F8F8; }
    .nav-dropdown-sep { height: 1px; background: #E8E8E8; margin: 4px 0; }

    /* ─── PAGE TITLE ─── */
    .page-hero {
      padding: 32px 0 20px;
    }
    .page-tabs {
      display: flex;
      border-bottom: 1px solid #EAEAEA;
    }
    .page-tab {
      font-family: Riforma, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: rgba(0,0,0,0.45);
      padding: 10px 0;
      margin-right: 24px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.15s;
      text-decoration: none;
    }
    .page-tab:hover { color: #323232; }
    .page-tab.is-active { color: #323232; border-bottom-color: #323232; }
    .page-eyebrow {
      font-family: Riforma, sans-serif;
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 2px;
    }
    .page-title {
      font-family: Riforma, sans-serif;
      font-size: 32px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      color: #323232;
    }

    /* ─── FILM GRID ─── */
    .page-body { padding: 32px 0 80px; }

    .film-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      column-gap: 4px;
      row-gap: 36px;
    }
    @media (min-width: 650px)  { .film-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1562px) { .film-grid { grid-template-columns: repeat(4, 1fr); } }

    .film-card { display: block; background: #fff; cursor: pointer; transition: background 0.1s; }
    .film-card:hover { background: #fafafa; }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 371 / 209;
      overflow: hidden;
      background: #d0d0d0;
    }
    .card-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
    }
    .film-card:hover .card-img { transform: scale(1.03); }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 55%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 12px 14px;
    }
    .card-title {
      font-family: Riforma, sans-serif;
      font-size: 22px; font-weight: 500;
      text-transform: uppercase; letter-spacing: -0.1px;
      line-height: 1.2; color: #fff;
      margin-bottom: 1px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta {
      font-family: Riforma, sans-serif;
      font-size: 12px; font-weight: 400;
      text-transform: uppercase; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta-director { font-weight: 700; }

    /* ─── COLLECTION TILES ─── */
    .coll-tile {
      display: flex;
      aspect-ratio: 371 / 209;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
    }
    .coll-tile-left {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      overflow: hidden;
    }
    .coll-tile-count {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #fff;
      font-family: Riforma, sans-serif;
      font-size: 13px;
      font-weight: 700;
    }
    .coll-tile-count svg { flex-shrink: 0; }
    .coll-tile-treatment {
      display: block;
      max-width: 90%;
      max-height: 82px;
      object-fit: contain;
      object-position: left top;
    }
    .coll-tile-title {
      font-family: Riforma, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.2px;
      line-height: 1.2;
      color: #fff;
    }
    .coll-tile-title--solo { font-size: 22px; }
    .coll-tile-subtitle {
      display: block;
      font-size: 22px;
      font-weight: 500;
      margin-top: 2px;
    }
    .coll-tile-right {
      width: 185px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .coll-tile-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── CONTENT PLACEHOLDER ─── */
    .page-body {
      padding: 48px 0 80px;
    }
  </style>
</head>

function fitCollTileText() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.coll-tile-left').forEach(left => {
      const available = left.clientWidth - 28;
      ['.coll-tile-subtitle', '.coll-tile-title--solo'].forEach(sel => {
        const el = left.querySelector(sel);
        if (!el) return;
        el.style.fontSize = '';
        let size = 22;
        while (el.scrollWidth > available && size > 11) {
          size -= 0.5;
          el.style.fontSize = size + 'px';
        }
      });
    });
  });
}

function renderCollections() {
  document.getElementById('collectionsGrid').innerHTML = COLLECTIONS.map(col => {
    const left = col.treatment
      ? `<img class="coll-tile-treatment" src="${col.treatment}" alt="${col.title}" loading="lazy">`
      : col.subtitle
        ? `<div class="coll-tile-title">${col.title}<span class="coll-tile-subtitle">${col.subtitle}</span></div>`
        : `<div class="coll-tile-title coll-tile-title--solo">${col.title}</div>`;
    return `<a class="coll-tile" href="#" aria-label="${col.title}">
      <div class="coll-tile-left" style="background:${col.color}">
        <div>${left}</div>
        <div class="coll-tile-count"><svg width="24" height="18" viewBox="0 0 24 19" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20.4121 0C21.0432 0 21.5546 0.511527 21.5547 1.14258V14.4248C21.5546 15.0559 21.0432 15.5674 20.4121 15.5674H1.14258C0.511562 15.5673 5.76033e-05 15.0558 0 14.4248V1.14258C0.00013309 0.511609 0.511609 0.00013335 1.14258 0H20.4121ZM8.38281 11.1768L15.3682 7.68359L8.38281 4.19141V11.1768Z" fill="white"/><mask id="ci-mask" fill="white"><rect x="2.44971" y="2.44971" width="21.555" height="15.5675" rx="1.14282"/></mask><rect x="2.44971" y="2.44971" width="21.555" height="15.5675" rx="1.14282" stroke="white" stroke-width="2.395" mask="url(#ci-mask)"/></svg>${col.items}</div>
      </div>
      <div class="coll-tile-right"><img class="coll-tile-img" src="${col.img}" alt="${col.title}" loading="lazy"></div>
    </a>`;
  }).join('');
  fitCollTileText();
}
renderCollections();

function toggleDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('navDropdown');
  const open = dd.classList.toggle('open');
  document.getElementById('navHamburger').setAttribute('aria-expanded', open);
}
document.addEventListener('click', () => {
  const dd = document.getElementById('navDropdown');
  if (dd) { dd.classList.remove('open'); document.getElementById('navHamburger').setAttribute('aria-expanded', false); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const dd = document.getElementById('navDropdown');
    if (dd) { dd.classList.remove('open'); document.getElementById('navHamburger').setAttribute('aria-expanded', false); }
  }
});
</script>
