<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MUBI — Trailer Player</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Riforma'; font-display:swap; src:url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Regular.woff2) format('woff2'); }
    @font-face { font-family:'Riforma'; font-display:swap; src:url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Medium.woff2) format('woff2'); font-weight:500; }
    @font-face { font-family:'Riforma'; font-display:swap; src:url(https://assets.mubicdn.net/static/fonts/RiformaLLWeb-Bold.woff2) format('woff2'); font-weight:bold; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: #000;
    }

    body {
      background: #000;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── 1920×1080 frame, scaled to fit window width ── */
    #frame {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      transform-origin: top left;
    }

    /* ── Video ── */
    #trailer {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
    }

    /* ── Tile overlay ── */
    #tile-wrap {
      position: absolute;
      bottom: 87px;
      right: 87px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 1.2s ease 2.5s;
    }
    #tile-wrap.visible { opacity: 1; pointer-events: auto; }

    /* ── Countdown label ── */
    #countdown-label {
      font-family: 'Riforma', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
    }

    #countdown-label span {
      font-weight: 500;
      color: #fff;
    }

    /* ── Seekbar & timer ── */
    #player-controls {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      width: auto;
      z-index: 10;
    }

    #seekbar-track {
      width: 560px;
      height: 20px;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      overflow: visible;
    }

    #seekbar-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
    }

    #seekbar-fill {
      position: absolute;
      left: 0;
      height: 3px;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.25s linear;
      pointer-events: none;
    }

    #seekbar-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    #seekbar-marker-dot {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      flex-shrink: 0;
    }

    #seekbar-marker-label {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    #timer {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    #timer span { color: rgba(255,255,255,0.5); }
    #current-time { display: inline-block; min-width: 4ch; text-align: right; }

    /* ── Play overlay ── */
    #play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }
    #play-overlay.hidden { display: none; }
    #play-overlay-label {
      font-family: 'Riforma', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    /* ── Cancel hint ── */
    #cancel-hint {
      position: absolute;
      top: 16px;
      right: 87px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      z-index: 10;
    }
    #cancel-hint span { color: #fff; }
    #cancel-hint.hidden { display: none; }

    /* ── Collection page ── */
    #collection-page {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
      display: none;
      z-index: 20;
    }
    #collection-page.visible { display: block; }


    /* ── Collection tile ── */
    @keyframes tile-focus-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.7); }
      50%       { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1); }
    }

    #collection-tile {
      width: 429px;
      height: 238px;
      border-radius: 18px;
      overflow: hidden;
      animation: tile-focus-pulse 2.8s ease-in-out infinite;
      cursor: pointer;
      outline: none;
    }

    #collection-tile img {
      width: calc(100% + 1px);
      height: calc(100% + 1px);
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div id="frame">
    <video id="trailer" src="../brand_assets/DieMyLoveEnd_small.mp4" playsinline></video>
    <div id="play-overlay"><div id="play-overlay-label">Click to play</div></div>

    <div id="player-controls">
      <div id="timer"><span id="current-time">0:00</span> / <span id="total-time">0:00</span></div>
      <div id="seekbar-track">
        <div id="seekbar-fill"></div>
        <div id="seekbar-marker">
          <div id="seekbar-marker-dot"></div>
          <div id="seekbar-marker-label">End credits</div>
        </div>
      </div>
    </div>

    <div id="tile-wrap">
      <div id="countdown-label">TRAILER PLAYING IN <span><span id="seconds">213</span>S</span></div>
      <div id="collection-tile" tabindex="0">
        <img src="../brand_assets/trulymadly.jpg" alt="Cinema Collection">
      </div>
    </div>

    <div id="cancel-hint">Press <span>ESC</span> or Back on remote to cancel autoplay</div>

    <img id="collection-page" src="../brand_assets/Collection_page_Die.jpg" alt="Collection">

  </div>

  <script>
    const video = document.getElementById('trailer');
    const secondsEl = document.getElementById('seconds');
    const frame = document.getElementById('frame');

    function scaleFrame() {
      const scale = window.innerWidth / 1920;
      frame.style.transform = `scale(${scale})`;
      document.body.style.height = `${1080 * scale}px`;
    }

    window.addEventListener('resize', scaleFrame);
    scaleFrame();

    const overlay = document.getElementById('play-overlay');
    overlay.addEventListener('click', () => {
      video.play();
      overlay.classList.add('hidden');
    });

    const tileWrap        = document.getElementById('tile-wrap');
    const seekFill      = document.getElementById('seekbar-fill');
    const seekTrack     = document.getElementById('seekbar-track');
    const seekMarker    = document.getElementById('seekbar-marker');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl   = document.getElementById('total-time');

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }
    const CREDITS_AT = 82;
    const CARD_SHOW_AT = CREDITS_AT + 2;
    const AUTO_COUNTDOWN = 15;
    let cardShown = false;
    let countdownInterval = null;
    let cancelled = false;

    function updateCountdown() {
      if (video.currentTime >= CARD_SHOW_AT && !cardShown) {
        cardShown = true;
        tileWrap.classList.add('visible');
        let count = AUTO_COUNTDOWN;
        secondsEl.textContent = count;
        setTimeout(() => {
          countdownInterval = setInterval(() => {
          count--;
          secondsEl.textContent = Math.max(0, count);
          if (count <= 0) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            showCollectionPage();
          }
        }, 1000);
        }, 3700);
      }
    }

    function positionMarker() {
      if (!video.duration) return;
      seekMarker.style.left = `${(CREDITS_AT / video.duration) * 100}%`;
    }

    function updateControls() {
      if (!video.duration) return;
      seekFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
      currentTimeEl.textContent = formatTime(video.currentTime);
      totalTimeEl.textContent   = formatTime(video.duration);
    }

    seekTrack.addEventListener('click', (e) => {
      if (!video.duration) return;
      const scale = window.innerWidth / 1920;
      const rect = seekTrack.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      video.currentTime = pct * video.duration;
    });

    video.addEventListener('loadedmetadata', () => { positionMarker(); updateCountdown(); updateControls(); });
    video.addEventListener('timeupdate', () => { updateCountdown(); updateControls(); });

    // Fallback if metadata already loaded before listeners attached
    if (video.readyState >= 1) { positionMarker(); updateControls(); }

    function dismissTile() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      tileWrap.style.display = 'none';
      cancelled = true;
    }

    const collectionPage = document.getElementById('collection-page');

    function showCollectionPage() {
      dismissTile();
      document.getElementById('cancel-hint').classList.add('hidden');
      video.pause();
      collectionPage.classList.add('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismissTile();
      if (e.key === 'Enter') showCollectionPage();
    });

    video.addEventListener('ended', () => { if (!cancelled) showCollectionPage(); });

    document.getElementById('collection-tile').addEventListener('click', showCollectionPage);
  </script>

</body>
</html>
